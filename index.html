<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veltrix Campus — School Fee Management System</title>

<!-- Firebase 10 Compat -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   ROOT VARIABLES — JSS Green & Silver Institutional Theme
   ============================================================ */
:root {
  --ink:        #080f0a;
  --depth:      #0c1a10;
  --surface:    #111e14;
  --panel:      #162119;
  --lifted:     #1d2e20;
  --overlay:    #243328;

  --green:      #2d6e3e;
  --green-mid:  #3a8c52;
  --green-glow: #4caf6a;
  --green-soft: rgba(45,110,62,0.18);

  --silver:     #9ab5a0;
  --silver-lt:  #c8dccf;
  --silver-hl:  #e8f2eb;

  --gold-trace: #8ba87a;

  --text:       #deeee4;
  --muted:      #5e7d67;
  --faint:      #3a5240;

  --danger:     #e05252;
  --warn:       #d4962a;
  --info:       #4a9eca;
  --success:    #3a8c52;

  --border:     rgba(45,110,62,0.22);
  --border-lt:  rgba(45,110,62,0.10);
  --rad:        10px;
  --rad-lg:     14px;
  --shadow:     0 8px 32px rgba(0,0,0,0.45);
  --shadow-sm:  0 2px 10px rgba(0,0,0,0.3);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  font-family:'DM Sans', sans-serif;
  background:var(--ink);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 600px 400px at 0% 0%, rgba(45,110,62,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 500px 300px at 100% 100%, rgba(45,110,62,0.04) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}
a { color:inherit; text-decoration:none; }
button { cursor:pointer; }
input, select, textarea { font-family:'DM Sans', sans-serif; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--depth); }
::-webkit-scrollbar-thumb { background:var(--green); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--green-mid); }

/* ============================================================
   SPLASH SCREEN
   ============================================================ */
#splash {
  position:fixed; inset:0; z-index:9999;
  background:rgba(5,10,7,0.82);
  backdrop-filter:blur(6px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:0;
}
.splash-inner {
  display:flex; flex-direction:column; align-items:center;
  background:var(--card); border:1px solid var(--border);
  border-radius:18px; padding:36px 52px 28px;
  box-shadow:0 8px 48px rgba(0,0,0,0.55), 0 0 60px rgba(45,110,62,0.08);
  animation: splashFadeIn 0.5s ease forwards;
}
@keyframes splashFadeIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
.splash-emblem {
  width:88px; height:88px; border-radius:50%;
  border:2px solid var(--green-mid);
  display:flex; align-items:center; justify-content:center;
  position:relative; margin-bottom:28px;
  animation: emblGlow 2s ease-in-out infinite;
}
.splash-emblem::before {
  content:'';
  position:absolute; inset:-8px; border-radius:50%;
  border:1px solid rgba(45,110,62,0.2);
  animation:emblRingPulse 2s ease-in-out infinite;
}
@keyframes emblGlow {
  0%,100%{ box-shadow:0 0 20px rgba(45,110,62,0.35); }
  50%    { box-shadow:0 0 50px rgba(45,110,62,0.65), 0 0 80px rgba(45,110,62,0.2); }
}
@keyframes emblRingPulse {
  0%,100%{ opacity:0.4; transform:scale(1); }
  50%    { opacity:1;   transform:scale(1.05); }
}
.splash-jss-text {
  font-family:'Cinzel', serif;
  font-size:30px; font-weight:700;
  color:var(--green-glow);
  letter-spacing:6px;
}
.splash-firm {
  font-family:'Cinzel', serif;
  font-size:15px; font-weight:500;
  color:var(--silver-lt); letter-spacing:2.5px;
  margin-bottom:6px;
}
.splash-tagline {
  font-size:10px; color:var(--muted);
  letter-spacing:4px; text-transform:uppercase;
  margin-bottom:28px;
}
.splash-divider {
  width:160px; height:1px;
  background:linear-gradient(90deg, transparent, var(--green-mid), transparent);
  margin-bottom:20px;
}
.splash-product {
  font-size:12px; color:var(--faint); letter-spacing:2px; text-transform:uppercase;
}
.splash-bar {
  width:100%; height:2px; border-radius:0 0 18px 18px;
  background:linear-gradient(90deg, transparent, var(--green-mid), transparent);
  margin-top:20px; overflow:hidden; position:relative;
}
.splash-bar::after {
  content:''; position:absolute; top:0; left:-40%;
  width:40%; height:100%;
  background:var(--green-glow);
  animation:splashProgress 2s linear forwards;
}
@keyframes splashProgress { from{left:-40%} to{left:110%} }

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
#loginScreen {
  position:fixed; inset:0; z-index:1000;
  display:none; align-items:center; justify-content:center;
  background:var(--ink);
  padding:20px;
}
.login-wrap { width:100%; max-width:420px; }
.login-top { text-align:center; margin-bottom:32px; }
.login-logo-ring {
  width:60px; height:60px; border-radius:50%;
  border:2px solid var(--green);
  display:inline-flex; align-items:center; justify-content:center;
  margin-bottom:16px;
  box-shadow:0 0 20px rgba(45,110,62,0.3);
}
.login-logo-ring span { font-family:'Cinzel',serif; font-size:18px; color:var(--green-glow); font-weight:700; }
.login-title { font-family:'Cinzel',serif; font-size:20px; color:var(--silver-lt); font-weight:600; margin-bottom:4px; }
.login-sub { font-size:12px; color:var(--muted); letter-spacing:1px; }
.login-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--rad-lg); padding:36px 32px;
  box-shadow:var(--shadow);
}
.form-group { margin-bottom:18px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--silver); letter-spacing:0.5px; margin-bottom:8px; text-transform:uppercase; }
.form-control {
  width:100%; padding:12px 16px;
  background:var(--lifted); border:1px solid var(--border);
  border-radius:var(--rad); color:var(--text);
  font-size:14px; transition:border-color 0.2s, box-shadow 0.2s;
}
.form-control:focus { outline:none; border-color:var(--green-mid); box-shadow:0 0 0 3px rgba(45,110,62,0.12); }
.form-control::placeholder { color:var(--faint); }
.form-control option { background:var(--panel); }
.login-footer { text-align:center; margin-top:16px; font-size:12px; color:var(--muted); }
.err-box { background:rgba(224,82,82,0.1); border:1px solid rgba(224,82,82,0.25); border-radius:8px; padding:10px 14px; font-size:13px; color:#e09090; margin-bottom:16px; display:none; }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:10px 22px; border:none; border-radius:var(--rad);
  font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif;
  transition:all 0.18s ease; cursor:pointer; white-space:nowrap;
}
.btn svg { width:16px; height:16px; flex-shrink:0; }
.btn-primary   { background:var(--green);     color:#fff; }
.btn-primary:hover { background:var(--green-mid); transform:translateY(-1px); box-shadow:0 4px 16px rgba(45,110,62,0.35); }
.btn-secondary { background:var(--lifted);    color:var(--silver-lt); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--green-mid); color:var(--text); }
.btn-danger    { background:rgba(224,82,82,0.15); color:#e09090; border:1px solid rgba(224,82,82,0.25); }
.btn-danger:hover { background:rgba(224,82,82,0.25); }
.btn-success   { background:rgba(58,140,82,0.15); color:var(--green-glow); border:1px solid rgba(58,140,82,0.25); }
.btn-success:hover { background:rgba(58,140,82,0.25); }
.btn-ghost     { background:transparent; color:var(--muted); border:1px solid var(--border-lt); }
.btn-ghost:hover { color:var(--text); border-color:var(--border); }
.btn-full { width:100%; }
.btn-sm { padding:7px 14px; font-size:12px; }
.btn-lg { padding:14px 28px; font-size:15px; }
.btn:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }

/* ============================================================
   APP SHELL
   ============================================================ */
#app { display:flex; height:100vh; overflow:hidden; display:none; }

/* SIDEBAR */
#sidebar {
  width:230px; background:var(--depth); border-right:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0;
  overflow-y:auto; position:relative; z-index:10;
}
.sb-brand { padding:20px 18px 16px; border-bottom:1px solid var(--border); }
.sb-brand-name { font-family:'Cinzel',serif; font-size:12px; color:var(--green-glow); font-weight:600; letter-spacing:1px; }
.sb-brand-sub  { font-size:10px; color:var(--muted); margin-top:2px; letter-spacing:0.5px; }
.sb-school { padding:12px 18px; border-bottom:1px solid var(--border); }
.sb-school-name { font-size:13px; font-weight:600; color:var(--silver-lt); }
.sb-school-sub  { font-size:10px; color:var(--muted); margin-top:1px; }
.sb-nav { flex:1; padding:8px 0; overflow-y:auto; }
.sb-section-label { font-size:9px; font-weight:700; color:var(--faint); text-transform:uppercase; letter-spacing:2px; padding:14px 18px 4px; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 18px; font-size:13px; font-weight:500;
  color:var(--muted); cursor:pointer; transition:all 0.15s;
  border-left:3px solid transparent; position:relative;
}
.nav-item svg { width:16px; height:16px; flex-shrink:0; }
.nav-item:hover { color:var(--silver-lt); background:rgba(45,110,62,0.07); }
.nav-item.active { color:var(--green-glow); background:rgba(45,110,62,0.13); border-left-color:var(--green-mid); }
.nav-badge { margin-left:auto; background:var(--danger); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; }
.sb-footer { padding:14px 18px; border-top:1px solid var(--border); }
.sb-user { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.sb-avatar { width:34px; height:34px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }
.sb-uname  { font-size:13px; font-weight:600; color:var(--text); }
.sb-urole  { font-size:10px; color:var(--muted); }

/* MAIN AREA */
#mainArea { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* HEADER */
#header {
  background:var(--depth); border-bottom:1px solid var(--border);
  padding:10px 22px; display:flex; align-items:center; gap:14px;
  flex-shrink:0; position:relative; z-index:5;
}
.back-btn {
  width:34px; height:34px; border-radius:8px;
  background:var(--lifted); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--muted); flex-shrink:0; transition:all 0.15s;
}
.back-btn:hover { color:var(--text); border-color:var(--green-mid); }
.back-btn.invisible { visibility:hidden; pointer-events:none; }
.back-btn svg { width:16px; height:16px; }
.search-wrap { flex:1; max-width:460px; position:relative; }
.search-box {
  width:100%; padding:9px 14px 9px 38px;
  background:var(--lifted); border:1px solid var(--border);
  border-radius:var(--rad); color:var(--text); font-size:13px;
  transition:border-color 0.2s;
}
.search-box:focus { outline:none; border-color:var(--green-mid); }
.search-box::placeholder { color:var(--faint); }
.search-ico { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
.search-ico svg { width:15px; height:15px; }
#searchDropdown {
  position:absolute; top:calc(100% + 6px); left:0; right:0;
  background:var(--panel); border:1px solid var(--border);
  border-radius:var(--rad); max-height:300px; overflow-y:auto;
  z-index:200; box-shadow:var(--shadow); display:none;
}
.s-item { padding:11px 14px; cursor:pointer; border-bottom:1px solid var(--border-lt); transition:background 0.12s; }
.s-item:hover { background:var(--green-soft); }
.s-item:last-child { border-bottom:none; }
.s-name { font-size:13px; font-weight:600; color:var(--text); }
.s-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.hdr-pill { font-size:11px; color:var(--muted); background:var(--lifted); border:1px solid var(--border-lt); padding:4px 12px; border-radius:20px; }

/* CONTENT */
#content { flex:1; overflow-y:auto; padding:24px; position:relative; z-index:1; }

/* ============================================================
   PAGE COMPONENTS
   ============================================================ */
.page-head { margin-bottom:22px; }
.page-title { font-size:21px; font-weight:700; color:var(--text); margin-bottom:3px; }
.page-sub   { font-size:13px; color:var(--muted); }
.page-actions { display:flex; gap:10px; flex-wrap:wrap; }
.flex-between { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }

/* STAT CARDS */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(175px,1fr)); gap:14px; margin-bottom:22px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--rad); padding:18px 20px; position:relative; overflow:hidden; }
.stat-card::after { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--green-mid); }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; font-weight:600; }
.stat-value { font-size:26px; font-weight:700; color:var(--green-glow); line-height:1; }
.stat-sub   { font-size:11px; color:var(--muted); margin-top:5px; }
.stat-card.red::after   { background:var(--danger); }
.stat-card.red .stat-value { color:#e09090; }
.stat-card.gold::after  { background:var(--warn); }
.stat-card.gold .stat-value { color:#d4c47a; }
.stat-card.blue::after  { background:var(--info); }
.stat-card.blue .stat-value { color:#7ac0e0; }

/* CARD */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--rad); margin-bottom:18px; }
.card-hdr { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.card-title { font-size:14px; font-weight:600; color:var(--text); }
.card-body  { padding:18px; }

/* TABLE */
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { padding:9px 12px; text-align:left; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:11px 12px; font-size:13px; color:var(--text); border-bottom:1px solid var(--border-lt); }
tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:var(--green-soft); }
td.muted { color:var(--muted); }

/* BADGES */
.badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-green  { background:rgba(58,140,82,0.18);  color:var(--green-glow); }
.badge-red    { background:rgba(224,82,82,0.18);  color:#e09090; }
.badge-yellow { background:rgba(212,150,42,0.18); color:#d4c47a; }
.badge-blue   { background:rgba(74,158,202,0.18); color:#7ac0e0; }
.badge-gray   { background:rgba(155,181,160,0.18);color:var(--silver); }

/* FORM LAYOUT */
.form-row   { display:grid; grid-template-columns:1fr 1fr;   gap:14px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
.form-section-title { font-size:12px; font-weight:700; color:var(--green-glow); letter-spacing:1px; text-transform:uppercase; margin:22px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
@media(max-width:768px) { .form-row,.form-row-3 { grid-template-columns:1fr; } }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.72); z-index:800; display:none; align-items:center; justify-content:center; padding:16px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--panel); border:1px solid var(--border); border-radius:var(--rad-lg); width:100%; max-width:580px; max-height:90vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,0.55); animation:modalIn 0.2s ease; }
.modal-lg { max-width:740px; }
@keyframes modalIn { from{opacity:0;transform:translateY(12px);scale:0.98;} to{opacity:1;transform:none;scale:1;} }
.modal-hdr { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:16px; font-weight:700; color:var(--text); }
.modal-close { background:none; border:none; color:var(--muted); font-size:22px; line-height:1; transition:color 0.15s; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:22px; }
.modal-foot { padding:14px 22px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }

/* ALERT */
.alert { padding:11px 14px; border-radius:8px; font-size:13px; margin-bottom:14px; }
.alert-success { background:rgba(58,140,82,0.12); border:1px solid rgba(58,140,82,0.25); color:var(--green-glow); }
.alert-danger  { background:rgba(224,82,82,0.12); border:1px solid rgba(224,82,82,0.25); color:#e09090; }
.alert-warning { background:rgba(212,150,42,0.12); border:1px solid rgba(212,150,42,0.25); color:#d4c47a; }
.alert-info    { background:rgba(74,158,202,0.12); border:1px solid rgba(74,158,202,0.25); color:#7ac0e0; }

/* EMPTY STATE */
.empty-state { text-align:center; padding:50px 20px; }
.empty-state svg { width:44px; height:44px; color:var(--faint); margin-bottom:14px; }
.empty-state p { font-size:14px; color:var(--muted); }

/* LOADER */
.loader-wrap { display:flex; align-items:center; justify-content:center; padding:50px; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--green-mid); border-radius:50%; animation:spin 0.75s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* TABS */
.tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:20px; }
.tab-item { padding:11px 18px; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; }
.tab-item.active { color:var(--green-glow); border-bottom-color:var(--green-mid); }
.tab-item:hover:not(.active) { color:var(--silver-lt); }

/* CLASS CARDS GRID */
.class-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; }
.class-card {
  background:var(--panel); border:1px solid var(--border);
  border-radius:var(--rad); padding:16px; cursor:pointer;
  transition:all 0.15s; position:relative; overflow:hidden;
}
.class-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--green-mid); transform:scaleX(0); transform-origin:left; transition:transform 0.2s; }
.class-card:hover { border-color:var(--green-mid); transform:translateY(-2px); box-shadow:var(--shadow-sm); }
.class-card:hover::before { transform:scaleX(1); }
.cc-name  { font-size:14px; font-weight:600; color:var(--text); margin-bottom:4px; }
.cc-count { font-size:12px; color:var(--muted); }
.cc-bar   { height:3px; border-radius:2px; background:var(--lifted); margin-top:10px; overflow:hidden; }
.cc-fill  { height:100%; background:var(--green); border-radius:2px; }

/* APPROVAL ITEMS */
.approval-item { background:var(--panel); border:1px solid var(--border); border-radius:var(--rad); padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:14px; }
.ap-info { flex:1; }
.ap-title { font-size:13px; font-weight:600; color:var(--text); margin-bottom:3px; }
.ap-meta  { font-size:11px; color:var(--muted); }

<script>
/* ============================================================
   FIREBASE CONFIG — REPLACE WITH YOUR ACTUAL CONFIG
   ============================================================ */
const firebaseConfig = {
  apiKey:            "AIzaSyBvwkjy-wOlDRfr05bEuh9BCXtmCZqyZ0I",
  authDomain:        "veltrix-campus.firebaseapp.com",
  projectId:         "veltrix-campus",
  storageBucket:     "veltrix-campus.firebasestorage.app",
  messagingSenderId: "726127791296",
  appId:             "1:726127791296:web:2a4f75c0f62dc5839c3125"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

/* ============================================================
   HARDCODED ACCOUNTS — DUAL-SOURCE AUTH
   Passwords are stored in localStorage so users can change
   them from within the app. Falls back to Firebase Auth if
   email doesn't match any local account.
   ============================================================ */
const LOCAL_ACCOUNTS_KEY = 'sfms_local_accounts';

function getLocalAccounts() {
  try {
    const raw = localStorage.getItem(LOCAL_ACCOUNTS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // Default hardcoded accounts — change these anytime from My Profile
  // schoolId MUST match the Firestore document ID under the 'schools' collection.
  // If left blank, the app will auto-detect it on first login.
  return {
    'admin@sfms.school': {
      password:    'admin@123',
      role:        'admin',
      name:        'School Admin',
      designation: 'Administrative Staff',
      email:       'admin@sfms.school',
      phone:       '',
      qualification: '',
      officeAddress: '',
      schoolId:    ''
    },
    'principal@sfms.school': {
      password:    'principal@123',
      role:        'principal',
      name:        'School Principal',
      designation: 'Principal',
      email:       'principal@sfms.school',
      phone:       '',
      qualification: '',
      officeAddress: '',
      schoolId:    ''
    }
  };
}

function saveLocalAccounts(accounts) {
  localStorage.setItem(LOCAL_ACCOUNTS_KEY, JSON.stringify(accounts));
}

function findLocalAccount(email) {
  const accounts = getLocalAccounts();
  return accounts[email.toLowerCase()] || null;
}

function updateLocalAccountPassword(email, newPassword) {
  const accounts = getLocalAccounts();
  if (accounts[email.toLowerCase()]) {
    accounts[email.toLowerCase()].password = newPassword;
    saveLocalAccounts(accounts);
    return true;
  }
  return false;
}

function updateLocalAccountProfile(email, data) {
  const accounts = getLocalAccounts();
  if (accounts[email.toLowerCase()]) {
    Object.assign(accounts[email.toLowerCase()], data);
    saveLocalAccounts(accounts);
    return true;
  }
  return false;
}

/* ============================================================
   STATE
   ============================================================ */
let currentUser     = null;  // Firebase user OR synthetic local user
let currentRole     = null;  // 'admin' | 'principal'
let currentProfile  = null;  // Firestore user doc OR local account data
let currentSchoolId = null;  // Multi-tenant school isolation key
let isLocalAccount  = false; // true = logged in via local account (no Firebase)
let navStack        = [];    // Navigation history
let currentView     = null;  // Active view name
let searchDebounce  = null;
let pendingCount    = 0;

/* ============================================================
   SPLASH → AUTH FLOW
   ============================================================ */
window.addEventListener('load', () => {
  updateHeaderDate();
  setInterval(updateHeaderDate, 60000);

  setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      initAuth();
    }, 500);
  }, 2000);
});

function updateHeaderDate() {
  const d = new Date();
  document.getElementById('hdrDate').textContent =
    d.toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'});
}

function initAuth() {
  // Check if a local account session is saved
  try {
    const saved = sessionStorage.getItem('sfms_session');
    if (saved) {
      const session = JSON.parse(saved);
      const acct = findLocalAccount(session.email);
      if (acct) {
        isLocalAccount = true;
        currentUser    = { uid: 'local_' + session.email, email: session.email };
        currentProfile = { ...acct };
        currentRole    = acct.role;
        // Resolve schoolId (sync from cached value, or auto-detect)
        if (acct.schoolId) {
          currentSchoolId = acct.schoolId;
          showApp();
        } else {
          resolveSchoolId(acct).then(id => {
            currentSchoolId = id;
            if (!currentSchoolId) console.warn('Could not resolve schoolId for local account.');
            showApp();
          });
        }
        return;
      }
    }
  } catch(e) {}

  // Otherwise use Firebase Auth
  auth.onAuthStateChanged(async user => {
    if (user) {
      currentUser    = user;
      isLocalAccount = false;
      await loadUserProfile(user.uid);
      showApp();
    } else {
      showLogin();
    }
  });
}

async function loadUserProfile(uid) {
  try {
    const doc = await db.collection('users').doc(uid).get();
    if (doc.exists) {
      currentProfile  = doc.data();
      currentRole     = currentProfile.role;
      currentSchoolId = currentProfile.schoolId || null;
    } else {
      currentProfile  = { name: currentUser.displayName || currentUser.email.split('@')[0], role: 'admin', email: currentUser.email };
      currentRole     = 'admin';
      currentSchoolId = null;
    }
    if (!currentSchoolId) {
      console.warn('No schoolId assigned to this user.');
    } else {
      console.log('School loaded:', currentSchoolId);
    }
  } catch(e) {
    console.error(e);
    currentProfile  = { name:'User', role:'admin' };
    currentRole     = 'admin';
    currentSchoolId = null;
  }
}

// Scoped collection helper — always use for school data
function schoolCol(colName) {
  if (!currentSchoolId) throw new Error('No schoolId assigned.');
  return db.collection('schools').doc(currentSchoolId).collection(colName);
}

// Auto-detects schoolId for local accounts that don't have one hardcoded.
// Queries Firestore 'schools' collection, picks the first doc, and caches it
// back into localStorage so subsequent logins are instant.
async function resolveSchoolId(acct) {
  if (acct.schoolId) return acct.schoolId;
  try {
    const snap = await db.collection('schools').limit(1).get();
    if (!snap.empty) {
      const detectedId = snap.docs[0].id;
      // Cache back into localStorage so we don't query every login
      const accounts = getLocalAccounts();
      const key = acct.email.toLowerCase();
      if (accounts[key]) {
        accounts[key].schoolId = detectedId;
        // Also sync schoolId to ALL local accounts (same school deployment)
        Object.values(accounts).forEach(a => { if (!a.schoolId) a.schoolId = detectedId; });
        saveLocalAccounts(accounts);
      }
      return detectedId;
    }
  } catch(e) { console.warn('resolveSchoolId failed:', e); }
  return null;
}

/* ============================================================
   LOGIN / LOGOUT
   ============================================================ */
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('loginPass').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginErr');
  err.style.display = 'none';
  if (!email || !pass) { showErr('Please enter email and password.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span style="opacity:0.7">Signing in…</span>';

  // ── 1. Try local account first ──────────────────────────────
  const localAcct = findLocalAccount(email);
  if (localAcct) {
    if (localAcct.password === pass) {
      isLocalAccount = true;
      currentUser    = { uid: 'local_' + email, email };
      currentProfile = { ...localAcct };
      currentRole    = localAcct.role;
      // Resolve schoolId before entering app
      currentSchoolId = await resolveSchoolId(localAcct);
      if (!currentSchoolId) console.warn('No schoolId resolved — data will not load until a school exists in Firestore.');
      // Save session so page refresh stays logged in
      sessionStorage.setItem('sfms_session', JSON.stringify({ email }));
      document.getElementById('loginScreen').style.display = 'none';
      showApp();
      return;
    } else {
      showErr('Incorrect password. Please try again.');
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
      return;
    }
  }

  // ── 2. Fall through to Firebase Auth ────────────────────────
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    document.getElementById('loginScreen').style.display = 'none';
  } catch(e) {
    showErr(friendlyAuthError(e.code));
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
  }
}
function showErr(msg) {
  const e = document.getElementById('loginErr');
  e.textContent = msg; e.style.display = 'block';
}
function friendlyAuthError(code) {
  const m = { 'auth/wrong-password':'Incorrect password. Please try again.', 'auth/user-not-found':'No account found with this email.', 'auth/invalid-email':'Please enter a valid email address.', 'auth/too-many-requests':'Too many attempts. Account temporarily locked.' };
  return m[code] || 'Login failed. Please check your credentials.';
}
async function doLogout() {
  sessionStorage.removeItem('sfms_session');
  if (!isLocalAccount) await auth.signOut();
  currentUser = null; currentRole = null; currentProfile = null;
  currentSchoolId = null; // ← Fix: was leaking into next session
  isLocalAccount = false; navStack = [];
  document.getElementById('app').style.display = 'none';
  showLogin();
}
function showLogin() {
  const ls = document.getElementById('loginScreen');
  ls.style.display = 'flex';
}

/* ============================================================
   APP SHELL
   ============================================================ */
function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderSidebar();
  updateSidebarUser();
  loadSchoolMeta(); // ← dynamically populate school name/grades in sidebar
  if (currentRole === 'principal') {
    loadPendingCount();
  }
  navigate('dashboard');
}

async function loadSchoolMeta() {
  const nameEl = document.getElementById('sbSchoolName');
  const subEl  = document.getElementById('sbSchoolSub');
  if (!currentSchoolId) {
    if (nameEl) nameEl.textContent = 'No School Assigned';
    if (subEl)  subEl.textContent  = 'Contact administrator';
    return;
  }
  try {
    const doc = await db.collection('schools').doc(currentSchoolId).get();
    if (doc.exists) {
      const s = doc.data();
      if (nameEl) nameEl.textContent = s.name || currentSchoolId;
      if (subEl)  subEl.textContent  = s.gradeRange || s.tagline || '';
    } else {
      if (nameEl) nameEl.textContent = currentSchoolId;
      if (subEl)  subEl.textContent  = '';
    }
  } catch(e) {
    if (nameEl) nameEl.textContent = currentSchoolId;
    if (subEl)  subEl.textContent  = '';
  }
}

function updateSidebarUser() {
  const name = currentProfile?.name || 'User';
  const role = currentRole === 'principal' ? 'Principal' : 'Admin';
  document.getElementById('sbAvatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('sbName').textContent   = name;
  document.getElementById('sbRole').textContent   = role;
}

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  const isPrincipal = currentRole === 'principal';

  const adminItems = [
    { id:'dashboard',  label:'Dashboard',       icon:iconDashboard },
    { id:'students',   label:'Students',        icon:iconStudents },
    { id:'recordFee',  label:'Record Payment',  icon:iconFee },
    { id:'finance',    label:'Fees & Finance',  icon:iconFinance },
    { id:'academic',   label:'Academic Structure', icon:iconAcademic },
    { id:'terminated', label:'Terminated',      icon:iconTerminated },
    { id:'profile',    label:'My Profile',      icon:iconProfile },
  ];
  const principalItems = [
    { id:'dashboard',  label:'Dashboard',       icon:iconDashboard },
    { id:'students',   label:'Students',        icon:iconStudents },
    { id:'recordFee',  label:'Record Payment',  icon:iconFee },
    { id:'finance',    label:'Fees & Finance',  icon:iconFinance },
    { id:'academic',   label:'Academic Structure', icon:iconAcademic },
    { id:'terminated', label:'Terminated',      icon:iconTerminated },
    { id:'reports',    label:'Reports & Analytics', icon:iconReports },
    { id:'approvals',  label:'Pending Approvals', icon:iconApprovals, badge:true },
    { id:'profile',    label:'My Profile',      icon:iconProfile },
  ];
  const items = isPrincipal ? principalItems : adminItems;
  nav.innerHTML = items.map(it => `
    <div class="nav-item" id="nav-${it.id}" onclick="navigate('${it.id}')">
      ${it.icon}
      <span>${it.label}</span>
      ${it.badge ? `<span class="nav-badge" id="pendingBadge" style="${pendingCount===0?'display:none':''}">${pendingCount}</span>` : ''}
    </div>
  `).join('');
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.getElementById('nav-'+id);
  if (el) el.classList.add('active');
}

async function loadPendingCount() {
  try {
    const snap = await schoolCol('deletionRequests').where('status','==','pending').get();
    pendingCount = snap.size;
    const badge = document.getElementById('pendingBadge');
    if (badge) { badge.textContent = pendingCount; badge.style.display = pendingCount > 0 ? '' : 'none'; }
  } catch(e){}
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function navigate(view, params={}, pushToStack=true) {
  if (pushToStack && currentView && currentView !== view) {
    navStack.push({ view:currentView, params:{} });
  }
  currentView = view;
  setActiveNav(view);
  updateBackBtn();
  renderView(view, params);
}

function goBack() {
  if (navStack.length === 0) return;
  const prev = navStack.pop();
  currentView = prev.view;
  setActiveNav(prev.view);
  updateBackBtn();
  renderView(prev.view, prev.params);
}

function updateBackBtn() {
  const btn = document.getElementById('backBtn');
  if (navStack.length > 0) btn.classList.remove('invisible');
  else btn.classList.add('invisible');
}

function pushNav(view, params={}) {
  navStack.push({ view:currentView, params:{} });
  currentView = view;
  updateBackBtn();
  renderView(view, params);
}

function setContent(html) {
  document.getElementById('content').innerHTML = html;
}

function renderView(view, params) {
  switch(view) {
    case 'dashboard':     return (currentRole==='principal')?renderPrincipalDash():renderAdminDash();
    case 'students':      return renderStudents(params);
    case 'studentProfile':return renderStudentProfile(params.id, params.studentData);
    case 'addStudent':    return renderAddStudent(params);
    case 'recordFee':     return renderRecordFee(params);
    case 'finance':       return renderFinance();
    case 'academic':      return renderAcademic();
    case 'classSection':  return renderClassSection(params.className);
    case 'terminated':    return renderTerminated();
    case 'reports':       return renderReports();
    case 'approvals':     return renderApprovals();
    case 'profile':       return renderProfile();
    default:              setContent('<div class="empty-state"><p>View not found.</p></div>');
  }
}

/* ============================================================
   DASHBOARD — ADMIN
   ============================================================ */
async function renderAdminDash() {
  if (!currentSchoolId) {
    setContent(`<div class="alert alert-danger" style="margin:24px">⚠ Dashboard cannot load: No school is assigned to this account. Please contact your system administrator to link a school to your login.</div>`);
    return;
  }
  setContent(`<div class="loader-wrap"><div class="spinner"></div></div>`);
  try {
    const [stuSnap, txSnap, termSnap, pendSnap] = await Promise.all([
      schoolCol('students').where('status','==','active').get(),
      schoolCol('feeTransactions').get(),
      schoolCol('terminatedStudents').get(),
      schoolCol('deletionRequests').where('status','==','pending').get()

function filterStudentTable(q) {
  const rows = document.querySelectorAll('#studentTable tbody tr');

  });
}

async function saveStudent(isExisting) {
  const data = {
    name:           getVal('fs_name'),
    dob:            getVal('fs_dob'),
    gender:         getVal('fs_gender'),
    admissionDate:  getVal('fs_admDate'),
    class:          getVal('fs_class'),
    section:        getVal('fs_section'),
    rollNumber:     getVal('fs_roll'),
    admissionNumber:getVal('fs_admNo'),
    pen:            getVal('fs_pen'),
    parentName:     getVal('fs_parent'),
    contact:        getVal('fs_contact'),
    address:        getVal('fs_address'),
    previousSchool: getVal('fs_prevSchool'),
    status:         'active',
    createdAt:      firebase.firestore.FieldValue.serverTimestamp(),
    createdBy:      currentUser.uid,
    type:           isExisting ? 'existing' : 'new'
  };
  if (isExisting) {
    data.monthlyFee   = parseFloat(getVal('fs_monthlyFee')||0);
    data.outstandingBalance = parseFloat(getVal('fs_outstanding')||0);
    data.feeWaiver    = getVal('fs_waiver');
  }

  // Validation
  const required = ['name','dob','gender','class','section','rollNumber','admissionNumber','pen','parentName','contact'];
  for (const f of required) {
    if (!data[f]) { showFormAlert('addStudentAlert', `Please fill in all required fields.`, 'danger'); return; }
  }

  try {
    const ref = await schoolCol('students').add(data);
    // Update academic structure
    const csKey = `${data.class}-${data.section}`;
    await schoolCol('academicStructure').doc(csKey).set({
      className: data.class, section: data.section,
      studentIds: firebase.firestore.FieldValue.arrayUnion(ref.id)
    }, { merge:true });

    showFormAlert('addStudentAlert', 'Student saved successfully!', 'success');
    setTimeout(() => pushNav('studentProfile', { id:ref.id }), 1200);
  } catch(e) {
    showFormAlert('addStudentAlert', 'Error: ' + e.message, 'danger');
  }
}

let _feeSearchDebounce = null;
function searchStudentForFee(q) {
  clearTimeout(_feeSearchDebounce);
  if (!q.trim()) { document.getElementById('feeStudentResults').style.display='none'; return; }
  _feeSearchDebounce = setTimeout(async () => {
    const snap = await schoolCol('students').where('status','==','active').get();
    const lq = q.toLowerCase();
    const results = snap.docs.filter(d=>{
      const s=d.data();
      return s.name?.toLowerCase().includes(lq)||
             s.admissionNumber?.toLowerCase().includes(lq)||
             s.rollNumber?.toString().includes(lq);
    }).slice(0,8);
    const el = document.getElementById('feeStudentResults');
    if (!results.length) { el.style.display='none'; return; }
    el.style.display='block';
    el.innerHTML = results.map(d=>{
      const s=d.data();
      return `<div class="s-item" onclick="selectFeeStudent('${d.id}','${s.name}','${s.class} ${s.section}')">
        <div class="s-name">${s.name}</div>
        <div class="s-meta">Adm# ${s.admissionNumber} · ${s.class} · Sec ${s.section}</div>
      </div>`;
    }).join('');
  }, 300);
}

function selectFeeStudent(id, name, cs) {
  window._selectedFeeStudent = { id, name, cs };
  document.getElementById('feeStudentSearch').value = name;
  document.getElementById('feeStudentResults').style.display='none';
  const info = document.getElementById('selectedStudentInfo');
  info.style.display='block';
  info.innerHTML = `Student: <strong>${name}</strong> · ${cs}`;
  info.dataset.id = id;
}

function updateAmountInWords(val) {
  const n = parseFloat(val);
  if (isNaN(n)) { document.getElementById('amtWordsWrap').style.display='none'; return; }
  document.getElementById('amtWordsWrap').style.display='block';
  document.getElementById('amtWords').textContent = 'In words: ' + numberToWords(n) + ' Rupees Only';
}

async function saveFeePayment(prefillId) {
  const student = window._selectedFeeStudent || (prefillId ? { id:prefillId } : null);
  if (!student?.id) { showFormAlert('feeAlert','Please select a student.','danger'); return; }

  const feeHead = getVal('feeFeeHead');
  const amount  = parseFloat(getVal('feeAmount')||0);
  const balance = parseFloat(getVal('feeBalance')||0);
  const mode    = getVal('feeMode');
  const date    = getVal('feeDate');
  const status  = getVal('feeStatus');

  if (!feeHead||!amount||!mode||!date) { showFormAlert('feeAlert','Please fill all required fields.','danger'); return; }

  // Get student info
  const sDoc = await schoolCol('students').doc(student.id).get();
  const sData = sDoc.data();
  const receiptNumber = 'RCP-' + Date.now();

  const tx = {
    receiptNumber, studentId:student.id,
    admissionNumber: sData.admissionNumber||'',
    studentName: sData.name||'',
    classSection: `${sData.class||''} – Section ${sData.section||''}`,
    feeHead, amountPaid:amount, amountInWords: numberToWords(amount) + ' Rupees Only',
    paymentMode:mode, date: firebase.firestore.Timestamp.fromDate(new Date(date)),
    remainingBalance:balance, paymentStatus:status,
    recordedBy: currentUser.uid, recordedByName: currentProfile?.name||'Admin'
  };

  try {
    await schoolCol('feeTransactions').add(tx);
    showFormAlert('feeAlert','Payment recorded successfully!','success');
    showReceipt(tx);
  } catch(e) {
    showFormAlert('feeAlert','Error: '+e.message,'danger');
  }
}

function showReceipt(tx) {
  const box = document.getElementById('receiptBox');
  if (!box) return;
  box.style.display='block';
  document.getElementById('rc_no').textContent = tx.receiptNumber;
  document.getElementById('rc_student').innerHTML = `
    <div class="r-row"><span class="r-lbl">Student Name</span><span class="r-val">${tx.studentName}</span></div>
    <div class="r-row"><span class="r-lbl">Class & Section</span><span class="r-val">${tx.classSection}</span></div>
    <div class="r-row"><span class="r-lbl">Admission No</span><span class="r-val">${tx.admissionNumber}</span></div>
  `;
  document.getElementById('rc_details').innerHTML = `
    <div class="r-row"><span class="r-lbl">Fee Head</span><span class="r-val">${tx.feeHead}</span></div>
    <div class="r-row"><span class="r-lbl">Payment Mode</span><span class="r-val">${tx.paymentMode}</span></div>
    <div class="r-row"><span class="r-lbl">Date</span><span class="r-val">${new Date(tx.date?.toDate?.()??tx.date).toLocaleDateString('en-IN')}</span></div>
    <div class="r-row"><span class="r-lbl">Remaining Balance</span><span class="r-val">₹${fmtNum(tx.remainingBalance)}</span></div>
    <div class="r-row"><span class="r-lbl">Status</span><span class="r-val">${tx.paymentStatus}</span></div>
    <div class="r-row" style="font-size:11px;color:var(--muted)"><span>Amount in Words</span><span>${tx.amountInWords}</span></div>

  document.getElementById('rc_total').innerHTML = `Amount Paid: ₹${fmtNum(tx.amountPaid)}`;
}

async function renderAcademic() {
  setContent(`<div class="loader-wrap"><div class="spinner"></div></div>`);
  try {
    const classOrder = ['Nursery','LKG','UKG','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Grade 6','Grade 7','Grade 8','Grade 9','Grade 10'];
    const snap = await schoolCol('academicStructure').get();
    const stuSnap = await schoolCol('students').where('status','==','active').get();
    const totalStudents = stuSnap.size;

    // Build class-section count map
    const countMap = {};
    stuSnap.docs.forEach(d => {
      const s = d.data();
      const key = `${s.class}-${s.section}`;
      countMap[key] = (countMap[key]||0)+1;
    });

    // Build sorted list
    const entries = [];
    const sectionSnap = await schoolCol('students').get();
    const seen = new Set();
    sectionSnap.docs.forEach(d=>{
      const s = d.data();
      if (!s.class || !s.section) return;
      const key=`${s.class}-${s.section}`;
      if (!seen.has(key)) { seen.add(key); entries.push({ class:s.class, section:s.section, key }); }
    });
    entries.sort((a,b)=>{
      const ia=classOrder.indexOf(a.class); const ib=classOrder.indexOf(b.class);
      if (ia!==ib) return ia-ib;
      return a.section.localeCompare(b.section);
    });

    setContent(`
      <div class="page-head">
        <div class="page-title">Academic Structure</div>
        <div class="page-sub">${entries.length} class-sections · ${totalStudents} active students total</div>
      </div>
      <div class="class-grid">
        ${entries.length===0 ? '<p style="color:var(--muted)">No class sections created yet. Add students to see structure.</p>' :
          entries.map(e=>{
            const cnt = countMap[e.key]||0;
            const pct = Math.min(Math.round((cnt/40)*100),100);
            return `<div class="class-card" onclick="pushNav('classSection',{className:'${e.class}',section:'${e.section}'})">
              <div class="cc-name">${e.class} – Section ${e.section}</div>
              <div class="cc-count">${cnt} student${cnt!==1?'s':''}</div>
              <div class="cc-bar"><div class="cc-fill" style="width:${pct}%"></div></div>
            </div>`;
          }).join('')}
      </div>
    `);
  } catch(e) {
    setContent(`<div class="alert alert-danger">Error: ${e.message}</div>`);
  }
}

async function terminateStudent(id, name) {
  showConfirm(
    'Terminate Student',
    `Are you sure you want to terminate <strong>${name}</strong>? Their record will be moved to the Terminated Students section.`,
    async () => {
      try {
        const sDoc = await schoolCol('students').doc(id).get();
        const s = sDoc.data();
        const txSnap = await schoolCol('feeTransactions').where('studentId','==',id).get();
        const totalPaid = txSnap.docs.reduce((sum,d)=>sum+(d.data().amountPaid||0),0);
        const outstanding = txSnap.docs.length > 0 ? (txSnap.docs[txSnap.docs.length-1].data().remainingBalance||0) : 0;

        await schoolCol('terminatedStudents').add({
          studentId:id, studentName:s.name, admissionNumber:s.admissionNumber,
          class:s.class, section:s.section,
          terminationDate: new Date().toLocaleDateString('en-IN'),
          totalDue: totalPaid + outstanding, amountPaid: totalPaid,
          outstandingBalance: outstanding,
          terminatedBy: currentUser.uid
        });
        await schoolCol('students').doc(id).update({ status:'terminated' });
        navigate('terminated');
      } catch(e) { alert('Error: ' + e.message); }
    }
  );
}

async function renderApprovals() {
  if (currentRole !== 'principal') { setContent('<div class="alert alert-danger">Access denied.</div>'); return; }
  setContent(`<div class="loader-wrap"><div class="spinner"></div></div>`);
  try {
    const snap = await schoolCol('deletionRequests').where('status','==','pending').get();
    const reqs = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b) => (b.timestamp?.seconds||0) - (a.timestamp?.seconds||0)); // client-side sort avoids composite index

    setContent(`
      <div class="page-head">
        <div class="page-title">Pending Approvals</div>
        <div class="page-sub">${reqs.length} request${reqs.length!==1?'s':''} awaiting your decision.</div>
      </div>
      ${reqs.length===0?`
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <p>All clear! No pending approval requests.</p>
        </div>
      `:reqs.map(r=>`
        <div class="approval-item">
          <div class="ap-info">
            <div class="ap-title">Delete ${r.recordType||'Record'}: ${r.recordDescription||r.recordId}</div>
            <div class="ap-meta">Requested by ${r.requestedByName||r.requestedBy} · ${fmtDate(r.timestamp)}</div>
          </div>
          <div class="ap-actions">
            <button class="btn btn-success btn-sm" onclick="handleApproval('${r.id}','${r.recordType}','${r.recordId}',true)">✓ Approve</button>
            <button class="btn btn-danger btn-sm" onclick="handleApproval('${r.id}','${r.recordType}','${r.recordId}',false)">✗ Reject</button>
          </div>
        </div>
      `).join('')}
    `);
  } catch(e) {
    setContent(`<div class="alert alert-danger">Error: ${e.message}</div>`);
  }
}

async function handleApproval(reqId, recordType, recordId, approve) {
  try {
    if (approve && recordType === 'transaction') {
      await schoolCol('feeTransactions').doc(recordId).delete();
    }
    if (approve && recordType === 'student') {
      await schoolCol('students').doc(recordId).delete();
    }
    await schoolCol('deletionRequests').doc(reqId).update({ status: approve ? 'approved' : 'rejected', resolvedAt: firebase.firestore.FieldValue.serverTimestamp(), resolvedBy: currentUser.uid });
    loadPendingCount();
    renderApprovals();
  } catch(e) { alert('Error: ' + e.message); }
}

async function saveProfile() {
  const data = {
    name:          getVal('pf_name'),
    designation:   getVal('pf_designation'),
    phone:         getVal('pf_phone'),
    qualification: getVal('pf_qual'),
    officeAddress: getVal('pf_addr')
  };
  try {
    if (isLocalAccount) {
      // Update localStorage-persisted local account
      updateLocalAccountProfile(currentUser.email, data);
    } else {
      // Update Firestore
      await db.collection('users').doc(currentUser.uid).set(data, { merge:true });
    }
    Object.assign(currentProfile, data);
    updateSidebarUser();
    showFormAlert('profileAlert','Profile updated successfully!','success');
  } catch(e) { showFormAlert('profileAlert','Error: '+e.message,'danger'); }
}

async function changePassword() {
  const cur = getVal('pw_current'); const nw = getVal('pw_new'); const cn = getVal('pw_confirm');
  if (!cur||!nw||!cn) { showFormAlert('pwAlert','Please fill all fields.','danger'); return; }
  if (nw !== cn)      { showFormAlert('pwAlert','New passwords do not match.','danger'); return; }
  if (nw.length < 8)  { showFormAlert('pwAlert','Password must be at least 8 characters.','danger'); return; }
  if (!/[a-zA-Z]/.test(nw)||!/[0-9]/.test(nw)) { showFormAlert('pwAlert','Password must include letters and numbers.','danger'); return; }

  try {
    if (isLocalAccount) {
      // Verify current password against local store
      const acct = findLocalAccount(currentUser.email);
      if (!acct || acct.password !== cur) {
        showFormAlert('pwAlert','Current password is incorrect.','danger'); return;
      }
      updateLocalAccountPassword(currentUser.email, nw);
      // Update session profile too
      currentProfile.password = nw;
    } else {
      // Firebase re-auth + update
      const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, cur);
      await currentUser.reauthenticateWithCredential(cred);
      await currentUser.updatePassword(nw);
    }
    showFormAlert('pwAlert','Password changed successfully! Use the new password on next login.','success');
    document.getElementById('pw_current').value='';
    document.getElementById('pw_new').value='';
    document.getElementById('pw_confirm').value='';
  } catch(e) { showFormAlert('pwAlert','Error: '+e.message,'danger'); }
}

function onSearch(q) {
  clearTimeout(searchDebounce);
  if (!q.trim()) { document.getElementById('searchDropdown').style.display='none'; return; }
  searchDebounce = setTimeout(() => doSearch(q), 350);
}

async function doSearch(q) {
  try {
    const snap = await schoolCol('students').get();
    const lq = q.toLowerCase();
    const results = snap.docs.filter(d=>{
      const s=d.data();
      return s.name?.toLowerCase().includes(lq)||
             s.admissionNumber?.toLowerCase().includes(lq)||
             s.rollNumber?.toString().includes(lq)||
             s.pen?.toLowerCase().includes(lq)||
             s.parentName?.toLowerCase().includes(lq)||
             s.contact?.includes(lq);
    }).slice(0,10);

    const dd = document.getElementById('searchDropdown');
    if (!results.length) { dd.style.display='none'; return; }
    dd.style.display='block';
    dd.innerHTML = results.map(d=>{
      const s=d.data();
      return `<div class="s-item" onmousedown="selectSearchResult('${d.id}')">
        <div class="s-name">${s.name}</div>
        <div class="s-meta">Adm# ${s.admissionNumber||'—'} · ${s.class||''} ${s.section||''} · ${s.status==='active'?'Active':'Terminated'}</div>
      </div>`;
    }).join('');
  } catch(e) {}
}

  document.getElementById('searchBox').value = '';

// Number to words converter
function numberToWords(num) {
  const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  if(num===0)return'Zero';
  if(num<0)return'Minus '+numberToWords(-num);
  let str='';
  if(Math.floor(num/10000000)>0){str+=numberToWords(Math.floor(num/10000000))+' Crore ';num%=10000000;}
  if(Math.floor(num/100000)>0){str+=numberToWords(Math.floor(num/100000))+' Lakh ';num%=100000;}
  if(Math.floor(num/1000)>0){str+=numberToWords(Math.floor(num/1000))+' Thousand ';num%=1000;}
  if(Math.floor(num/100)>0){str+=numberToWords(Math.floor(num/100))+' Hundred ';num%=100;}
  if(num>0){if(num<20)str+=a[num];else str+=b[Math.floor(num/10)]+(num%10?' '+a[num%10]:'');}
  return str.trim();
}
